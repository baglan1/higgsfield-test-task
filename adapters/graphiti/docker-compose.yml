name: memory-adapter-graphiti

services:
  falkordb:
    image: falkordb/falkordb:latest
    # Internal only — accessed by graphiti-adapter via the compose network.
    expose:
      - "6379"
    volumes:
      - falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  graphiti-adapter:
    build: .
    ports:
      - "8083:8083"
    environment:
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      MEMORY_CHAT_MODEL:  ${MEMORY_CHAT_MODEL:-gpt-4o-mini}
      MEMORY_EMBED_MODEL: ${MEMORY_EMBED_MODEL:-text-embedding-3-small}
      MEMORY_AUTH_TOKEN:  ${MEMORY_AUTH_TOKEN:-}
      FALKORDB_HOST:      falkordb
      FALKORDB_PORT:      6379
    depends_on:
      falkordb:
        condition: service_healthy

volumes:
  falkordb-data:
