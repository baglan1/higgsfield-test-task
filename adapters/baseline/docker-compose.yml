name: memory-adapter-baseline

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER:     baseline
      POSTGRES_PASSWORD: baseline
      POSTGRES_DB:       baseline
    expose:
      - "5432"
    volumes:
      - baseline-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseline -d baseline"]
      interval: 2s
      timeout: 3s
      retries: 30

  baseline-adapter:
    build: .
    ports:
      - "8085:8085"
    environment:
      PG_URI:             postgresql://baseline:baseline@postgres:5432/baseline
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      MEMORY_EMBED_MODEL: ${MEMORY_EMBED_MODEL:-text-embedding-3-small}
      MEMORY_EMBED_DIM:   ${MEMORY_EMBED_DIM:-1536}
      MEMORY_AUTH_TOKEN:  ${MEMORY_AUTH_TOKEN:-}
      MEMORY_TOP_K:       ${MEMORY_TOP_K:-10}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  baseline-pg:
